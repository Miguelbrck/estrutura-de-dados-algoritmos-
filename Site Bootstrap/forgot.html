<body>
    <div class="quadrado">
                <h4>Um codigo será enviado para seu email</h4>
       <form>
  <div class="row">
    <label for="inputEmail3" class="col-sm-2 col-form-label">Email</label>
    <div class="col-sm-10">
      <input type="email" class="form-control" id="inputEmail3" placeholder="jose@gmail.com">
    </div>
  </div>
  <div class="row">
    <label for="inputPassword3" class="col-sm-2 col-form-label">Senha antiga</label>
    <div class="col-sm-10">
      <input type="password" class="form-control" id="inputPassword3" placeholder="Senha@123">
    </div>
  </div>
       <form>
  <form>
    <div class="row">
        <label for="inputEmail3" class="col-sm-2 col-form-label">
            Telefone
        </label>

        <div class="col-sm-10">
            <input 
                type="tel" 
                class="form-control" 
                id="inputTelefone"
                name="telefone"
                placeholder="(34) 99999-9999"
            >
        </div>
</form>
  </div>
  <button type="button" class="btn btn-outline-success" onclick="mostrarCodigo()">
    Enviar
</button>

<!-- DIV escondida -->
<div id="codigoDiv" style="display: none; margin-top:20px;">
    
    <label for="codigo">Digite o código:</label>

    <input 
        type="text"
        id="codigo"
        class="form-control"
        placeholder="Digite o código recebido"
    >
</div>

<script>
    function mostrarCodigo() {
        document.getElementById("codigoDiv").style.display = "block";
    }
</script>
</form>
