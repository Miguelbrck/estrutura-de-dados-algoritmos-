<!DOCTYPE>
<html>
    <head>Formulário Checkbox Produtos</head>

    <body>
        <form>
            <div>
                <fildset>
                    <legend>Produtos</legend>
                    <br>
                    <p>
                        <label>
                            <input type="checkbox" name="computador"
                            value="Computador"> Computador
                        </label>
                    </p>
                    <p>
                        <label>
                            <input type="checkbox" name="monitor"
                            value="Monitor"> Monitor
                        </label>
                    </p>
                    <p>
                        <label>
                            <input type="checkbox" name="impressora"
                            value="Impressora"> Impressora
                        </label>
                    </p>
                </fildset>
            </div>
        </form>     


        <br>
        <div>
            <label>
                Deixe sua sugestão: <br>
                <textarea cols="30" rows="5"></textarea>
            </label>
        </div>
        <br>
        <div>
        <p>
            <label>
                Site: <input type="url" list="sites" name="link">
            </label>
        </p>
        <datalist id="sites">
            <option label="Portal unipam" value="https://portal.unipam.edu.br/login"></option>
            <option label="Github" value="https://www.bing.com/ck/a?!&&p=63284c36851c43713bb4d808348f2903301b2bc8b708649db7826ca857945e90JmltdHM9MTc3MzEwMDgwMA&ptn=3&ver=2&hsh=4&fclid=1308c20b-8aec-62dd-2585-d5138b4463e4&psq=github&u=a1aHR0cHM6Ly9naXRodWIuY29tLw"></option>
            <option label="Instagram" value="https://www.bing.com/ck/a?!&&p=c919d98daed9ba35a85d826f374f3bdd00e8fd795a17a1d317277f27e3bd7c83JmltdHM9MTc3MzEwMDgwMA&ptn=3&ver=2&hsh=4&fclid=1308c20b-8aec-62dd-2585-d5138b4463e4&psq=instagram&u=a1aHR0cHM6Ly93d3cuaW5zdGFncmFtLmNvbS8"></option>
        </datalist>
        </div>
        <br>

            <button type="submit">Enviar</button>
    </body>
</html>
